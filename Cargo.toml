[package]
name = "rudzio"
version = "0.1.0"
edition = { workspace = true }
description = "Async testing framework with pluggable runtimes (tokio, compio) and per-test context setup/teardown."
license = "MIT OR Apache-2.0"
repository = "https://github.com/mykytanikitenko/rudzio"
readme = "README.md"
keywords = ["testing", "async", "tokio", "compio", "runtime"]
categories = ["development-tools::testing", "asynchronous"]

# Single `#[rudzio::main]` per crate aggregates every `#[rudzio::test]` under
# `tests/`; Cargo's auto-discovery would otherwise promote each file to its
# own test binary.
autotests = false

[dependencies]
# `channel` enables `SpawnExt::spawn_with_handle` / `LocalSpawnExt::spawn_local_with_handle`,
# used by the futures-executor runtime.
futures-util = { workspace = true, features = ["channel"] }
# Wait-free MPSC + select! macro used by the live-output drawer thread
# (`src/output/render.rs`) to multiplex lifecycle events, pipe byte chunks,
# a redraw timer, and a shutdown signal.
crossbeam-channel = { workspace = true }
linkme = { workspace = true }
rudzio-macro = { workspace = true }
tokio-util = { workspace = true }
tokio = { workspace = true, optional = true }
compio-runtime = { workspace = true, features = ["time"], optional = true }
# compio-runtime depends on compio-driver with `default-features = false`,
# which leaves the I/O driver as a stub on Linux ("Stub driver does not
# support any operations" â†’ every compio test panics on first poll). Add
# a direct dep on compio-driver so we can opt in to the io-uring driver
# explicitly. The `io-uring` cargo feature is the same name as compio's
# default â€” it's a no-op on macOS / Windows (their cfg_if branches skip
# it), so a single feature flip works across platforms.
compio-driver = { workspace = true, optional = true }
embassy-executor = { workspace = true, optional = true }
futures-executor = { workspace = true, features = [
  "thread-pool",
], optional = true }
futures-timer = { workspace = true, optional = true }
send_wrapper = { workspace = true, features = ["futures"], optional = true }
# Only compiled when the `build` feature is on (the `rudzio::build`
# module). Kept optional so rudzio used purely as a runtime dep doesn't
# pull cargo_metadata's dep tree.
cargo_metadata = { workspace = true, optional = true }

# Signal handling is unconditional on Unix so the runner always cancels
# gracefully on both SIGINT and SIGTERM without any feature opt-in.
#
# libc is Unix-only here because the live-output capture
# (`src/output/pipe.rs`) uses `dup`/`dup2`/`pipe`/`setvbuf`/`fcntl` to
# redirect process-wide stdio through anonymous pipes; no Windows port
# yet (feature no-ops on non-unix).
[target.'cfg(unix)'.dependencies]
signal-hook = { workspace = true }
libc = { workspace = true }

# Self dev-dep turns on every runtime for the in-crate integration tests
# that run under `#[rudzio::main]`. Cargo unifies features, so this does not
# cause a duplicate build.
[dev-dependencies]
# Dogfood under every runtime rudzio ships.
rudzio = { path = ".", features = [
  "build",
  "common",
  "runtime-tokio-multi-thread",
  "runtime-tokio-current-thread",
  "runtime-tokio-local",
  "runtime-compio",
  "runtime-embassy",
  "runtime-futures",
] }
anyhow = "=1.0.102"
# Renderer regression tests construct a `Drawer` directly and feed it
# synthetic lifecycle events; that requires the same channel primitives
# the production code uses.
crossbeam-channel = { workspace = true }

[[test]]
name = "main"
path = "tests/main.rs"
harness = false

[lib]
test = false

[features]
# Build-script helper. Enable in `[build-dependencies]` to access
# `rudzio::build::expose_bins(...)` for cross-crate aggregator test
# runners.
build = ["dep:cargo_metadata"]
# Opt-in: the ready-made `Suite` / `Test` pair in `rudzio::common::context`.
# Off by default so consumers that implement their own context types don't
# pay for code they don't use.
common = []
runtime-tokio-multi-thread = [
  "dep:tokio",
  "dep:send_wrapper",
  "tokio/rt-multi-thread",
]
runtime-tokio-current-thread = ["dep:tokio", "dep:send_wrapper"]
runtime-tokio-local = ["dep:tokio", "dep:send_wrapper"]
runtime-compio = [
  "dep:compio-runtime",
  "dep:compio-driver",
  "compio-driver/io-uring",
  "dep:send_wrapper",
]
runtime-embassy = ["dep:embassy-executor", "dep:send_wrapper"]
runtime-futures = [
  "dep:futures-executor",
  "dep:futures-timer",
  "dep:send_wrapper",
]

[lints]
workspace = true

[workspace]
resolver = "3"
members = ["cargo-rudzio", "fixtures", "macro", "macro-internals", "migrate"]

[workspace.package]
edition = "2024"

[workspace.dependencies]
# Local crates
rudzio = { version = "0.1.0", path = "." }
rudzio-macro = { version = "0.1.0", path = "macro" }
rudzio-macro-internals = { version = "0.1.0", path = "macro-internals" }

# External crates (pinned to exact versions for reproducible builds)
anyhow = "=1.0.102"
cargo_metadata = "=0.23.1"
compio-runtime = "=0.11.0"
compio-driver = "=0.11.4"
crossbeam-channel = "=0.5.15"
libc = "=0.2.186"
signal-hook = "=0.4.4"
embassy-executor = { version = "=0.10.0", features = ["platform-std"] }
futures-executor = "=0.3.32"
futures-timer = "=3.0.3"
futures-util = "=0.3.32"
ignore = "=0.4.25"
prettyplease = "=0.2.37"
thiserror = "=2.0.18"
proc-macro2 = "=1.0.106"
quote = "=1.0.45"
send_wrapper = "=0.6.0"
syn = "=2.0.117"
toml_edit = "=0.25.11"
tokio = { version = "=1.52.1", features = ["rt", "macros", "time"] }
tokio-util = { version = "=0.7.18", features = ["rt"] }
trybuild = "=1.0.116"
linkme = "=0.3.36"

# ===========================================================================
# Rust compiler lints
# ===========================================================================
[workspace.lints.rust]
# `warnings` stays at `deny` (not `forbid`) because the rudzio `#[suite]`
# macro emits `#[allow(unused_mut)]` into user code; forbidding the
# meta-warnings group would block that allow.
warnings = "deny"
# `#[cfg(rudzio_test)]` is set by the migrate crate's integration-test runner
# to gate test-only behavior in the binary's source. Declaring it here keeps
# `unexpected_cfgs` quiet across the workspace without site-local allows.
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(rudzio_test)"] }

future_incompatible = { level = "forbid", priority = -1 }
keyword_idents = { level = "forbid", priority = -1 }
let_underscore = { level = "forbid", priority = -1 }
nonstandard_style = { level = "forbid", priority = -1 }
refining_impl_trait = { level = "forbid", priority = -1 }
rust_2018_idioms = { level = "forbid", priority = -1 }
rust_2021_compatibility = { level = "forbid", priority = -1 }
rust_2024_compatibility = { level = "forbid", priority = -1 }
# `unused` stays at `deny` (not `forbid`) because rudzio's `#[suite]`
# macro emits `#[allow(unused_mut)]` into user code (the codegen can't
# always prove that emitted bindings are mutated). Forbid would turn
# every such `#[allow(unused_mut)]` into a hard error.
unused = { level = "deny", priority = -1 }

# `unsafe_code` stays at `deny` (not `forbid`) so the few documented
# `#[expect(unsafe_code, reason = "â€¦")]` blocks (`src/output/pipe.rs`,
# `src/runtime/embassy/runtime.rs`, `src/suite.rs`, `src/runner.rs`)
# keep working. Forbid would turn each into a hard compile error.
unsafe_code = "deny"

macro_use_extern_crate = "forbid"
meta_variable_misuse = "forbid"
missing_copy_implementations = "forbid"
missing_debug_implementations = "forbid"
non_ascii_idents = "forbid"
redundant_imports = "forbid"
redundant_lifetimes = "forbid"
trivial_casts = "forbid"
trivial_numeric_casts = "forbid"
unit_bindings = "forbid"
# `unreachable_pub` stays at `deny`: `migrate/src/lib.rs`,
# `migrate/src/runner_scaffold.rs` (template), and
# `migrate/tests/main.rs` `#![allow]` it because they recompile
# `pub mod`s as test-only modules. Forbid would block those.
unreachable_pub = "deny"
unused_import_braces = "forbid"
unused_lifetimes = "forbid"
unused_qualifications = "forbid"
# `unused_results` stays at `deny`: `cargo-rudzio/src/{lib,main}.rs`
# `#![allow]` it for `toml_edit::insert/push` calls whose previous-
# value return is intentionally dropped. Forbid would block that.
unused_results = "deny"
variant_size_differences = "forbid"

# ===========================================================================
# Clippy lints
# ===========================================================================
[workspace.lints.clippy]
# `correctness` / `complexity` / `perf` / `style` / `cargo` are flipped
# to `forbid`: locking those in is the whole point of Phase 5. Nothing in
# the workspace `#[allow]`s a lint from these groups, so the upgrade is
# free.
cargo = { level = "forbid", priority = -1 }
complexity = { level = "forbid", priority = -1 }
correctness = { level = "forbid", priority = -1 }
perf = { level = "forbid", priority = -1 }
style = { level = "forbid", priority = -1 }
# `suspicious` stays at `deny` because `blanket_clippy_restriction_lints`
# (which fires when `restriction` is denied wholesale) lives in this
# group and we silence it with `allow` further down. Forbid here would
# block that override.
suspicious = { level = "deny", priority = -1 }
# `all` is the alias for `correctness + suspicious + style + complexity
# + perf`; keep it at `deny` so the `suspicious` exception above
# survives â€” the higher-priority individual groups still win.
all = { level = "deny", priority = -1 }
# `pedantic` / `nursery` / `restriction` stay at `deny` at the GROUP
# level so future-added lints from those groups don't slip in unnoticed.
# Specific lints from these groups are flipped to `forbid` individually
# below (see "individual restriction lints"); a few are kept at `deny`
# (or bumped to `allow`) when they're intentionally `#[expect]`-ed in
# fixtures or the golden-test harness:
#   â€˘ `pedantic`: `manual_assert` (test panic patterns),
#     `format_push_string` (test format-into-buffer pattern), â€¦
#   â€˘ `nursery`: `branches_sharing_code` (idiomatic match arms)
#   â€˘ `restriction`: `panic`, `unreachable`, `exit`, `print_stdout`,
#     `print_stderr`, `expect_used` â€” required by `migrate/fixtures/**`
#     and `migrate/tests/golden.rs`. These stay at the GROUP default
#     (`deny`) so file-level `#[expect]`/`#![allow]` keeps working.
nursery = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
restriction = { level = "deny", priority = -1 }

# ----- individual restriction lints flipped to `forbid` -----
# Every restriction lint that is NOT in the keep-at-deny set above and
# NOT in the keep-at-allow block below is forbidden individually so the
# group default is, in effect, `forbid` for everything we actually rely
# on. New restriction lints introduced by future clippy versions land
# under the group `deny` until explicitly upgraded here.
absolute_paths = "forbid"
alloc_instead_of_core = "forbid"
allow_attributes = "forbid"
allow_attributes_without_reason = "forbid"
arbitrary_source_item_ordering = "forbid"
arithmetic_side_effects = "forbid"
as_conversions = "forbid"
as_pointer_underscore = "forbid"
as_underscore = "forbid"
assertions_on_result_states = "forbid"
big_endian_bytes = "forbid"
cfg_not_test = "forbid"
clone_on_ref_ptr = "forbid"
cognitive_complexity = "forbid"
create_dir = "forbid"
dbg_macro = "forbid"
decimal_literal_representation = "forbid"
default_numeric_fallback = "forbid"
default_union_representation = "forbid"
deref_by_slicing = "forbid"
disallowed_script_idents = "forbid"
doc_include_without_cfg = "forbid"
doc_paragraphs_missing_punctuation = "forbid"
else_if_without_else = "forbid"
empty_drop = "forbid"
empty_enum_variants_with_brackets = "forbid"
empty_structs_with_brackets = "forbid"
error_impl_error = "forbid"
exhaustive_enums = "forbid"
exhaustive_structs = "forbid"
field_scoped_visibility_modifiers = "forbid"
filetype_is_file = "forbid"
float_arithmetic = "forbid"
float_cmp_const = "forbid"
fn_to_numeric_cast_any = "forbid"
get_unwrap = "forbid"
host_endian_bytes = "forbid"
if_then_some_else_none = "forbid"
impl_trait_in_params = "forbid"
indexing_slicing = "forbid"
infinite_loop = "forbid"
inline_asm_x86_att_syntax = "forbid"
inline_asm_x86_intel_syntax = "forbid"
integer_division = "forbid"
integer_division_remainder_used = "forbid"
iter_over_hash_type = "forbid"
large_include_file = "forbid"
let_underscore_must_use = "forbid"
let_underscore_untyped = "forbid"
little_endian_bytes = "forbid"
lossy_float_literal = "forbid"
map_err_ignore = "forbid"
map_with_unused_argument_over_ranges = "forbid"
mem_forget = "forbid"
min_ident_chars = "forbid"
missing_assert_message = "forbid"
missing_asserts_for_indexing = "forbid"
missing_docs_in_private_items = "forbid"
missing_inline_in_public_items = "forbid"
mixed_read_write_in_expression = "forbid"
module_name_repetitions = "forbid"
modulo_arithmetic = "forbid"
multiple_unsafe_ops_per_block = "forbid"
mutex_atomic = "forbid"
mutex_integer = "forbid"
needless_raw_strings = "forbid"
non_ascii_literal = "forbid"
non_zero_suggestions = "forbid"
partial_pub_fields = "forbid"
pathbuf_init_then_push = "forbid"
pointer_format = "forbid"
precedence_bits = "forbid"
pub_without_shorthand = "forbid"
rc_buffer = "forbid"
rc_mutex = "forbid"
redundant_test_prefix = "forbid"
ref_patterns = "forbid"
renamed_function_params = "forbid"
rest_pat_in_fully_bound_structs = "forbid"
return_and_then = "forbid"
same_name_method = "forbid"
self_named_module_files = "forbid"
semicolon_inside_block = "forbid"
shadow_reuse = "forbid"
shadow_same = "forbid"
shadow_unrelated = "forbid"
single_char_lifetime_names = "forbid"
str_to_string = "forbid"
string_add = "forbid"
string_lit_chars_any = "forbid"
string_slice = "forbid"
suspicious_xor_used_as_pow = "forbid"
todo = "forbid"
try_err = "forbid"
undocumented_unsafe_blocks = "forbid"
unimplemented = "forbid"
unnecessary_safety_comment = "forbid"
unnecessary_safety_doc = "forbid"
unnecessary_self_imports = "forbid"
unneeded_field_pattern = "forbid"
unseparated_literal_suffix = "forbid"
unused_result_ok = "forbid"
unused_trait_names = "forbid"
unwrap_in_result = "forbid"
unwrap_used = "forbid"
use_debug = "forbid"
verbose_file_reads = "forbid"
wildcard_enum_match_arm = "forbid"

blanket_clippy_restriction_lints = { level = "allow", priority = 1 }
#cargo_common_metadata = { level = "allow", priority = 1 }
#multiple_crate_versions = { level = "allow", priority = 1 }
#error_impl_error = { level = "allow", priority = 1 }
#field_scoped_visibility_modifiers = { level = "allow", priority = 1 }
implicit_return = { level = "allow", priority = 1 }
missing_trait_methods = { level = "allow", priority = 1 }
mod_module_files = { level = "allow", priority = 1 }
multiple_inherent_impl = { level = "allow", priority = 1 }
pattern_type_mismatch = { level = "allow", priority = 1 }
pub_use = { level = "allow", priority = 1 }
pub_with_shorthand = { level = "allow", priority = 1 }
question_mark_used = { level = "allow", priority = 1 }
redundant_pub_crate = { level = "allow", priority = 1 }
redundant_type_annotations = { level = "allow", priority = 1 }
semicolon_outside_block = { level = "allow", priority = 1 }
std_instead_of_alloc = { level = "allow", priority = 1 }
std_instead_of_core = { level = "allow", priority = 1 }
separated_literal_suffix = { level = "allow", priority = 1 }
single_call_fn = { level = "allow", priority = 1 }
tests_outside_test_module = { level = "allow", priority = 1 }
# TODO: propably ai bs
# Many test binaries include intentional panics and unreachable! calls to
# exercise the framework's panic handling. Their signature keeps a Result
# return so the surrounding framework machinery still type-checks.
panic_in_result_fn = { level = "allow", priority = 1 }
