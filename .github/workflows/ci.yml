name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Mon 06:00 UTC — re-run audit + deny against the latest RustSec
    # advisory database so newly-disclosed vulnerabilities surface
    # without waiting for the next push.
    - cron: '0 6 * * 1'

# Concurrency policy:
#   * Pull-request runs: group keyed on the PR ref. A new push to the
#     PR branch cancels the older run (only the latest commit's CI
#     matters; intermediate runs are noise).
#   * Push-to-main runs: group keyed on the unique run_id, so every
#     main commit's CI runs to completion and is NEVER cancelled by a
#     subsequent main push. With a single self-hosted runner the
#     runner naturally serializes them anyway.
#
# `cancel-in-progress: true` is universal, but only takes effect when
# a NEW run's group string matches an EXISTING run's group string.
# Per-run-id grouping on main means no two main runs ever share a
# group → cancellation is structurally impossible.
#
# Releases (release.yml) intentionally don't share this concurrency
# group — we never want to cancel a mid-flight publish.
concurrency:
  group: ${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: true

# `bash -exo pipefail` on every `run:` step. Without -e a failing
# command inside a multi-line script does not fail the workflow;
# without -x we cannot see which command produced which output;
# without pipefail a pipeline reports the exit of the LAST stage,
# not the (potentially failing) earlier stage. Pre-merge state had
# `just ci` produce 0 lines of output in 21s while the workflow
# reported success — this triple guards against that recurring.
defaults:
  run:
    shell: bash -exo pipefail {0}

jobs:
  ci:
    name: just ci
    # Bare actions/runner on cx33 (post PorfiryPetrovich-ai/infra PR #193
    # multi-target runner architecture). Tools come from the flake
    # devShell at runtime via `nix develop`; no nested container, no
    # local registry, no docker.sock. The runner process runs as
    # User=core on FCOS with the host's default seccomp — io_uring is
    # permitted under that profile (no opt-out needed).
    runs-on: [self-hosted, linux, hetzner-builder, nix, rust]
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so cargo-semver-checks can resolve prior tags
          # once it's added back to the aggregate post-first-publish.
          fetch-depth: 0

      # Pre-flight: surface disk-full early instead of silently no-op'ing
      # downstream commands. The cx33 builder's /var/lib/cache is a 196G
      # Hetzner Volume shared with the runner's `_work/` checkout root
      # and per-runner build caches; when it fills up, `cargo build` and
      # `nix develop`'s tmp work silently 0-byte while exiting 0 — the
      # exact phantom-success failure mode pre-merge state exhibited.
      - name: Assert disk space on /var/lib/cache
        run: |
          free_gb=$(df -BG /var/lib/cache | awk 'NR==2 {gsub("G",""); print $4+0}')
          echo "Free on /var/lib/cache: ${free_gb}GB"
          if [ "${free_gb}" -lt 5 ]; then
            echo "ERROR: /var/lib/cache has only ${free_gb}GB free; need >5GB. Run scripts/cx33-cache-clear.jl from PorfiryPetrovich-ai/infra."
            exit 1
          fi

      # Canary: confirms the nix dev-shell entry actually fires the
      # toolchain. If `nix develop` itself is broken (lock drift,
      # store-corruption, flake eval error) this step fails LOUD with
      # the underlying nix error instead of letting `just ci` exit
      # green-but-empty downstream. Also catches the shellHook TTY-guard
      # regression that the flake.nix change in this PR fixes — if
      # `exec fish` fires here, rustc never resolves.
      - name: Canary — nix shell + rustc resolve
        run: nix develop --extra-experimental-features 'nix-command flakes' --command rustc --version

      - name: just ci
        run: nix develop --extra-experimental-features 'nix-command flakes' --command just ci
