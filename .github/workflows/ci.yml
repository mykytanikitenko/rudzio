name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Mon 06:00 UTC — re-run audit + deny against the latest RustSec
    # advisory database so newly-disclosed vulnerabilities surface
    # without waiting for the next push.
    - cron: '0 6 * * 1'

# Cancel in-flight runs on the same branch when a newer push lands.
# Releases (release.yml) intentionally don't share this concurrency
# group — we never want to cancel a mid-flight publish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: just ci
    # Bare actions/runner on cx33 (post PorfiryPetrovich-ai/infra PR #193
    # multi-target runner architecture). Tools come from the flake
    # devShell at runtime via `nix develop`; no nested container, no
    # local registry, no docker.sock. The runner process runs as
    # User=core on FCOS with the host's default seccomp — io_uring is
    # permitted under that profile (no opt-out needed).
    runs-on: [self-hosted, linux, hetzner-builder, nix, rust]
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so cargo-semver-checks can resolve prior tags
          # once it's added back to the aggregate post-first-publish.
          fetch-depth: 0

      - name: just ci
        run: nix develop --extra-experimental-features 'nix-command flakes' --command just ci
