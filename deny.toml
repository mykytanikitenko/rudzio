# Policy enforced by `cargo deny check` (and `just check-deny`).
#
# Four sub-checks:
#   advisories — RustSec advisory database
#   licenses   — SPDX expressions on every transitive crate
#   bans       — multiple-version / wildcard / banned-crate guards
#   sources    — registry / git allowlist

[graph]
# Walk every feature gate so cargo-only and platform-only deps are
# included (e.g. compio's `io-uring` driver, embassy's `arch-std`).
all-features = true

[advisories]
version = 2
ignore = [
    # `paste` is archived and unmaintained, but no safe upgrade exists
    # — it's pulled in transitively by `compio-driver`/`compio-runtime`,
    # both of which use the macro internally and don't expose it. The
    # crate is feature-complete rather than buggy, and the upstream
    # advisory itself notes "no safe upgrade is available". Revisit
    # when compio releases a paste-free version (or migrates to
    # `pastey`).
    "RUSTSEC-2024-0436",
    # async-std discontinued. Only reachable via the `runtime-async-std`
    # feature flag, opt-in by callers who explicitly want the adapter.
    # Default features avoid it. Will revisit / drop the adapter when
    # callers stop using it.
    "RUSTSEC-2025-0052",
    # fxhash unmaintained. Pulled in transitively by an optional
    # runtime adapter; same default-features-off rationale as above.
    "RUSTSEC-2025-0057",
]

[licenses]
version = 2
# Every transitive license observed in the tree (verified via
# `cargo deny list`). Permissive only; no copyleft or unlicensed
# crates allowed.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    # Zlib — used by `nanorand` (pulled via flume → monoio runtime
    # adapter). OSI-approved + FSF Free; permissive, no copyleft.
    "Zlib",
]
# Confidence threshold for matching detected license text against
# SPDX templates. 0.93 is cargo-deny's recommended default.
confidence-threshold = 0.93

[bans]
# Different async-runtime adapter features (tokio / async-std / monoio
# / compio / embassy / smol) pull different transitive versions of the
# same crate (socket2, bitflags, windows-sys, flume, io-uring, ...).
# `all-features = true` in [graph] above means cargo-deny walks every
# feature gate, so these duplicates are structurally unavoidable
# unless all the upstream runtime crates agree on identical version
# pins (they don't). Downgrade to "warn" so the situation stays
# visible in CI output without failing the gate. Default-features-only
# builds remain single-version.
multiple-versions = "warn"
# Disallow wildcard versions in workspace `Cargo.toml` files.
wildcards = "deny"
# Allow at workspace root: workspace members refer to each other via
# `workspace = true` shorthand, which deny treats as "wildcard"
# without this exemption.
allow-wildcard-paths = true

[sources]
# Registry / git allowlist. crates.io is the only registry we publish
# from and consume — a stray git dep would be a red flag.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
